<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="400" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="16" fill="url(#glow)" clip-path="url(#clip)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Glow blobs behind chart -->
  <circle cx="870" cy="200" r="120" fill="#6366f1" opacity="0.08" filter="url(#blur)"/>
  <circle cx="940" cy="180" r="80" fill="#8b5cf6" opacity="0.07" filter="url(#blur)"/>

  <!-- ─── SUNBURST CHART (right side) ─── -->
  <!-- Center label -->
  <circle cx="870" cy="200" r="44" fill="#1e2130" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="870" y="196" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">305 GB</text>
  <text x="870" y="212" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">3.0M files</text>

  <!-- Ring 1 — large segments -->
  <!-- AppData ~38% → 0 to 137deg -->
  <path d="M870,200 L870,118 A82,82 0 0,1 941,241 Z" fill="#6366f1" opacity="0.85"/>
  <!-- node_modules ~22% → 137 to 216deg -->
  <path d="M870,200 L941,241 A82,82 0 0,1 802,241 Z" fill="#8b5cf6" opacity="0.85"/>
  <!-- Downloads ~16% → 216 to 274deg -->
  <path d="M870,200 L802,241 A82,82 0 0,1 818,131 Z" fill="#06b6d4" opacity="0.85"/>
  <!-- Documents ~14% → 274 to 324deg -->
  <path d="M870,200 L818,131 A82,82 0 0,1 870,118 Z" fill="#10b981" opacity="0.85"/>

  <!-- Ring 2 — subdivisions -->
  <path d="M870,200 L870,108 A92,92 0 0,1 962,258 Z" fill="none" stroke="#6366f1" stroke-width="14" stroke-opacity="0.35"/>
  <path d="M870,200 L962,258 A92,92 0 0,1 787,268 Z" fill="none" stroke="#8b5cf6" stroke-width="14" stroke-opacity="0.35"/>
  <path d="M870,200 L787,268 A92,92 0 0,1 795,116 Z" fill="none" stroke="#06b6d4" stroke-width="14" stroke-opacity="0.35"/>
  <path d="M870,200 L795,116 A92,92 0 0,1 870,108 Z" fill="none" stroke="#10b981" stroke-width="14" stroke-opacity="0.35"/>

  <!-- Ring 3 — outer ring -->
  <path d="M870,200 L870,98 A102,102 0 0,1 980,275 Z" fill="none" stroke="#6366f1" stroke-width="8" stroke-opacity="0.2"/>
  <path d="M870,200 L980,275 A102,102 0 0,1 770,278 Z" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-opacity="0.2"/>
  <path d="M870,200 L770,278 A102,102 0 0,1 778,107 Z" fill="none" stroke="#06b6d4" stroke-width="8" stroke-opacity="0.2"/>
  <path d="M870,200 L778,107 A102,102 0 0,1 870,98 Z" fill="none" stroke="#10b981" stroke-width="8" stroke-opacity="0.2"/>

  <!-- ─── TREEMAP (far right) ─── -->
  <g transform="translate(1020, 90)">
    <rect x="0" y="0" width="140" height="90" rx="6" fill="#6366f1" opacity="0.7"/>
    <rect x="0" y="96" width="85" height="60" rx="6" fill="#8b5cf6" opacity="0.7"/>
    <rect x="91" y="96" width="49" height="60" rx="6" fill="#06b6d4" opacity="0.6"/>
    <rect x="0" y="162" width="55" height="40" rx="6" fill="#10b981" opacity="0.6"/>
    <rect x="61" y="162" width="38" height="40" rx="6" fill="#f59e0b" opacity="0.6"/>
    <rect x="105" y="162" width="35" height="40" rx="6" fill="#ef4444" opacity="0.5"/>
    <rect x="0" y="208" width="140" height="22" rx="6" fill="#334155" opacity="0.5"/>
    <text x="70" y="37" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0" opacity="0.9">AppData</text>
    <text x="42" y="131" text-anchor="middle" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.9">node_mod</text>
    <text x="115" y="131" text-anchor="middle" font-family="monospace" font-size="8" fill="#e2e8f0" opacity="0.9">DL</text>
    <text x="27" y="186" text-anchor="middle" font-family="monospace" font-size="8" fill="#e2e8f0" opacity="0.9">Docs</text>
  </g>

  <!-- ─── LEFT TEXT SIDE ─── -->
  <!-- Title -->
  <text x="72" y="158" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="56" font-weight="700" fill="#f1f5f9" letter-spacing="-1">DiskSizer</text>

  <!-- Subtitle -->
  <text x="74" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">Windows Disk Space Analyzer</text>

  <!-- Divider -->
  <line x1="72" y1="216" x2="520" y2="216" stroke="#334155" stroke-width="1"/>

  <!-- Stats row -->
  <text x="74" y="244" font-family="monospace" font-size="13" fill="#6366f1">⬡ Sunburst</text>
  <text x="180" y="244" font-family="monospace" font-size="13" fill="#475569">+</text>
  <text x="196" y="244" font-family="monospace" font-size="13" fill="#8b5cf6">▦ Treemap</text>
  <text x="320" y="244" font-family="monospace" font-size="13" fill="#475569">+</text>
  <text x="336" y="244" font-family="monospace" font-size="13" fill="#06b6d4">⚡ IMF Scanner</text>

  <!-- Tech badge row -->
  <g transform="translate(72, 268)">
    <!-- Electron badge -->
    <rect x="0" y="0" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="36" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc">Electron</text>
    <!-- React badge -->
    <rect x="80" y="0" width="58" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="109" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#61dafb">React</text>
    <!-- D3 badge -->
    <rect x="146" y="0" width="40" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="166" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316">D3 v7</text>
    <!-- TypeScript badge -->
    <rect x="194" y="0" width="92" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="240" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">TypeScript</text>
  </g>

  <!-- Benchmark callout -->
  <rect x="72" y="312" width="480" height="52" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <rect x="72" y="312" width="4" height="52" rx="2" fill="#6366f1"/>
  <text x="88" y="334" font-family="monospace" font-size="11" fill="#94a3b8">IMF scanner benchmark  ·  3M files  ·  warm cache</text>
  <text x="88" y="353" font-family="monospace" font-size="12" fill="#e2e8f0">81.14s → 68.76s  <tspan fill="#10b981" font-weight="bold">1.18× faster</tspan>  ·  heap <tspan fill="#10b981" font-weight="bold">-73%</tspan>  (257MB → 69MB)</text>

  <!-- Author -->
  <text x="1180" y="390" text-anchor="end" font-family="monospace" font-size="10" fill="#334155">by ibrahimokdadov</text>
</svg>
